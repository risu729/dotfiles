# ref: https://mise.jdx.dev/configuration.html#global-config-config-mise-config-toml
#:schema https://mise.jdx.dev/schema/mise.json

[env]
RUSTC_WRAPPER = "sccache"
# disable bat paging
BAT_PAGING = "never"
# use powershell instead of pwsh as pwsh is not in the PATH sometimes
BROWSER = "powershell.exe -c Start-Process"
# colored GCC warnings and errors
GCC_COLORS = "error=01;31:warning=01;35:note=01;36:caret=01;32:locus=01:quote=01"
_.path = ["~/.local/bin"]

[tools]
# language tools
node = "latest"
bun = "latest"
aube = "latest"
npm = "latest"
# Don't use the vfox plugin; it doesn't support lockfiles
"aqua:yarn" = "latest"
pnpm = "latest"
java = "latest"
gradle = "latest"
rust = "latest"
python = "latest"
go = "latest"
pkl = "latest"

# mise requirements
cargo-binstall = "latest"
uv = "latest"
# for completion
usage = "latest"
watchexec = "latest"

# cli tools
jq = "latest"
yq = "latest"
github-cli = "latest"
glab = "latest"
"github:seachicken/gh-poi" = { version = "latest", bin = "gh-poi" }
"aqua:siketyan/ghr" = { version = "latest", prerelease = true }
fzf = "latest"
worktrunk = "latest"
bitwarden = "latest"
"aqua:mame/wsl2-ssh-agent" = "latest"
jc = "latest"
delta = "latest"
ripgrep = "latest"
eza = "latest"
bat = "latest"
fd = "latest"
atuin = "latest"
zoxide = "latest"
btop = "latest"
xh = "latest"
jd = "latest"
sd = "latest"
kubecolor = "latest"
kubectl = "latest"
kubectx = "latest"
kubeseal = "latest"
mitmproxy = "latest"
doggo = "latest"
pitchfork = { version = "latest", postinstall = "pitchfork boot disable || true; pitchfork boot enable" }
miller = "latest"
glow = "latest"
"github:garden-rs/garden" = "latest"
"pipx:markitdown" = { version = "latest", extras = "pdf,docx,pptx,xlsx" }
"npm:resend-cli" = "latest"

# ai agents
codex = { version = "latest", minimum_release_age = "0s" }
"npm:ccusage" = "latest"
claude = "latest"
copilot = "latest"
hunk = "latest"
herdr = "latest"

# linter/formatter tools
hk = "latest"
biome = "latest"
oxlint = "latest"
oxfmt = "latest"
actionlint = "latest"
ghalint = "latest"
pinact = "latest"
zizmor = "latest"
taplo = "latest"
prettier = "latest"
shfmt = "latest"
shellcheck = "latest"
yamlfmt = "latest"
yamllint = "latest"
lychee = "latest"
typos = "latest"
hadolint = "latest"

# uni tools
numbat = "latest"
typst = "latest"

# mise development
aqua = "latest"
pipx = "latest"
sccache = "latest"

[settings]
experimental = true
minimum_release_age = "3h"
cargo.binstall_native = true

[settings.npm]
package_manager = "aube"

[settings.python]
# disable python-build
compile = false

[task_config]
includes = [".config/mise/tasks"]

[shell_alias]
clip = "clip.exe"
m = "mise"
mx = "mise x"
c = "mise run codex-tmux"
l = "eza --all --long --git"
k = "kubecolor"
aptup = "sudo apt update && sudo apt upgrade -y"
cux = "ccusage codex"
