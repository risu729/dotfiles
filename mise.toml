# ref: https://mise.jdx.dev/configuration.html
#:schema https://mise.jdx.dev/schema/mise.json

min_version = "2026.6.13"

[vars]
PS_SCRIPT_ANALYZER_VERSION = "1.25.0"

[env]
HK_PKL_BACKEND = "pklr"

[tools]
bun = "1.3.14"
aube = "v1.24.0"
node = "26.3.1"
bitwarden = "2026.4.1"
hk = "1.48.0"
oxlint = "1.62.0"
oxfmt = "0.52.0"
actionlint = "1.7.12"
ghalint = "1.5.6"
pinact = "4.1.0"
zizmor = "1.26.1"
tombi = "1.1.5"
rumdl = "v0.2.21"
shfmt = "3.13.1"
shellcheck = "0.11.0"
yamlfmt = "0.21.0"
# required for pipx backend
uv = "0.11.24"
yamllint = "1.38.0"
lychee = "0.24.2"
typos = "1.47.2"
"npm:@typescript/native-preview" = "7.0.0-dev.20260601.1"
jc = "1.25.7"
hadolint = "2.14.0"
powershell = "7.6.3"

[settings]
experimental = true

[settings.npm]
package_manager = "aube"

[deps.bun]
auto = true
sources = ["package.json", "bun.lock"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[deps.bun-worker]
auto = true
dir = "worker"
sources = ["package.json", "bun.lock"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[task_config]
includes = ["tasks.toml", "tasks", "worker/tasks.toml", "worker/tasks"]

[hooks]
postinstall = """
{% if env.CI is undefined %}
  mise run --no-deps install:ps-script-analyzer
  hk install --mise
{% endif %}
"""
