# ref: https://mise.jdx.dev/configuration.html
#:schema https://mise.jdx.dev/schema/mise.json

min_version = "2026.5.5"

[vars]
PS_SCRIPT_ANALYZER_VERSION = "1.25.0"

[tools]
bun = "1.3.13"
aube = "1.9.1"
node = "24.15.0"
oxlint = "1.62.0"
oxfmt = "0.48.0"
actionlint = "1.7.12"
ghalint = "1.5.6"
pinact = "3.9.2"
zizmor = "1.24.1"
taplo = "0.10.0"
markdownlint-cli2 = "0.22.1"
shfmt = "3.13.1"
shellcheck = "0.11.0"
yamlfmt = "0.21.0"
# required for pipx backend
uv = "0.11.12"
yamllint = "1.38.0"
lychee = "0.24.2"
typos = "1.46.1"
"npm:ignore-sync" = "8.0.0"
"npm:jschema-validator" = "1.0.27"
jc = "1.25.6"
hadolint = "2.14.0"
powershell = "7.6.1"

[settings]
experimental = true

[settings.npm]
package_manager = "aube"

[deps.bun]
auto = true
sources = ["package.json", "bun.lock"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[deps.bun-worker]
auto = true
dir = "worker"
sources = ["package.json", "bun.lock"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[task_config]
includes = ["tasks.toml", "tasks", "worker/tasks.toml", "worker/tasks"]

[hooks]
postinstall = """
{% if env.CI is undefined %}
  mise run --no-deps install:ps-script-analyzer
{% endif %}
"""
