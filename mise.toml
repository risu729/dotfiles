# ref: https://mise.jdx.dev/configuration.html
#:schema https://mise.jdx.dev/schema/mise.json

min_version = "2026.3.9"

[vars]
PS_SCRIPT_ANALYZER_VERSION = "1.24.0"

[tools]
bun = "1.3.11"
node = "24.14.0"
oxlint = "1.56.0"
oxfmt = "0.41.0"
actionlint = "1.7.11"
ghalint = "1.5.5"
pinact = "3.9.0"
zizmor = "1.11.0"
taplo = "0.10.0"
markdownlint-cli2 = "0.21.0"
shfmt = "3.13.0"
shellcheck = "0.11.0"
yamlfmt = "0.21.0"
# required for pipx backend
uv = "0.10.12"
yamllint = "1.38.0"
lychee = "0.23.0"
typos = "1.44.0"
"npm:ignore-sync" = "8.0.0"
"npm:jschema-validator" = "1.0.27"
jc = "1.25.6"
hadolint = "2.14.0"
powershell = "7.6.0"

[settings]
experimental = true

[settings.npm]
bun = true

[task_config]
includes = ["tasks.toml", "tasks", "worker/tasks.toml", "worker/tasks"]

[hooks]
postinstall = """
{% if env.CI is undefined %}
  mise run buni ::: install:ps-script-analyzer
{% endif %}
"""
