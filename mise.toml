# ref: https://mise.jdx.dev/configuration.html
#:schema https://mise.jdx.dev/schema/mise.json
# TODO: Remove when the mise schema includes bootstrap hooks.
#:tombi schema.strict = false

min_version = "2026.7.7"

[vars]
PS_SCRIPT_ANALYZER_VERSION = "1.25.0"

[tools]
bun = "1.3.14"
aube = "v1.29.1"
node = "26.5.0"
github-cli = "2.96.0"
hk = "1.51.0"
oxlint = "1.72.0"
oxfmt = "0.59.0"
actionlint = "1.7.12"
ghalint = "1.5.6"
pinact = "4.1.0"
zizmor = "1.27.0"
tombi = "1.2.4"
rumdl = "v0.2.37"
shfmt = "3.13.1"
shellcheck = "0.11.0"
yamlfmt = "0.21.0"
# required for pipx backend
uv = "0.11.29"
yamllint = "1.38.0"
lychee = "0.24.2"
typos = "1.48.0"
"npm:typescript" = "7.0.2"
hadolint = "2.14.0"
betterleaks = "v1.6.1"
powershell = "7.6.3"

[settings]
experimental = true
dotfiles.default_mode = "symlink"

[settings.npm]
package_manager = "aube"

[deps.bun]
auto = true
sources = ["package.json", "bun.lock"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[deps.bun-worker]
auto = true
dir = "worker"
sources = ["package.json", "bun.lock"]
outputs = ["node_modules"]
run = "bun install --frozen-lockfile"

[task_config]
includes = ["tasks.toml", "tasks", "worker/tasks.toml", "worker/tasks"]

[bootstrap.hooks.pre-packages]
run = '''
# Persist passwordless sudo and replace the legacy repository symlink if present.
sudo mkdir --parents /etc/sudoers.d
sudoers_path=/etc/sudoers.d/01-users-nopasswd
sudoers_temporary_path=/etc/sudoers.d/.01-users-nopasswd.tmp
printf '%s\n' 'ALL ALL=(ALL:ALL) NOPASSWD: ALL' |
  sudo tee "${sudoers_temporary_path}" >/dev/null
sudo chmod 0440 "${sudoers_temporary_path}"
sudo mv --force "${sudoers_temporary_path}" "${sudoers_path}"

sudo install --directory --mode=0755 /etc/apt/keyrings

arch=$(dpkg --print-architecture)
# shellcheck source=/dev/null
codename=$(. /etc/os-release && echo "${UBUNTU_CODENAME:-${VERSION_CODENAME}}")

# ref: https://docs.docker.com/engine/install/ubuntu/#install-using-the-repository
curl --fail-with-body --silent --show-error --location https://download.docker.com/linux/ubuntu/gpg |
  sudo tee /etc/apt/keyrings/docker.asc >/dev/null
echo "deb [arch=${arch} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${codename} stable" |
  sudo tee /etc/apt/sources.list.d/docker.list >/dev/null
'''

[bootstrap.hooks.post-packages]
run = '''
username=$(whoami)
if ! groups "${username}" | grep --quiet --word-regexp docker; then
  sudo usermod --append --groups docker "${username}"
fi
'''

[bootstrap.hooks.post-dotfiles]
run = '''
sudo update-desktop-database
'''

[bootstrap.hooks.post-tools]
run = '''
for agent in universal claude-code; do
  mise exec -- gh skill install mattpocock/skills skills/productivity/grilling \
    --agent "${agent}" --scope user --pin main --force
done
'''

[bootstrap.hooks.final]
run = '''
if [ -t 0 ] && [ -t 1 ]; then
  dotfiles_root=$(git rev-parse --show-toplevel)
  if ! mise exec -- bash -i -c "${dotfiles_root}/wsl/setup-git.ts"; then
    echo "Git setup failed; run wsl/setup-git.ts manually if needed." >&2
  fi
fi
'''

[bootstrap.packages]
"apt:bubblewrap" = "latest"
"apt:build-essential" = "latest"
"apt:clang" = "latest"
"apt:clangd" = "latest"
"apt:clang-format" = "latest"
"apt:cmake" = "latest"
"apt:containerd.io" = "latest"
"apt:desktop-file-utils" = "latest"
"apt:docker-buildx-plugin" = "latest"
"apt:docker-ce" = "latest"
"apt:docker-ce-cli" = "latest"
"apt:docker-compose-plugin" = "latest"
"apt:ffmpeg" = "latest"
"apt:gdb" = "latest"
"apt:graphviz" = "latest"
"apt:libssl-dev" = "latest"
"apt:llvm" = "latest"
"apt:parallel" = "latest"
"apt:pkg-config" = "latest"
"apt:strace" = "latest"
"apt:xdg-utils" = "latest"
"apt:zip" = "latest"

[bootstrap.repos]
"~/.ghr/github.com/risu729/aqua" = { url = "https://github.com/risu729/aqua.git" }
"~/.ghr/github.com/risu729/aqua-registry" = { url = "https://github.com/risu729/aqua-registry.git" }
"~/.ghr/github.com/risu729/biwa" = { url = "https://github.com/risu729/biwa.git" }
"~/.ghr/github.com/risu729/hk" = { url = "https://github.com/risu729/hk.git" }
"~/.ghr/github.com/risu729/hk-config" = { url = "https://github.com/risu729/hk-config.git" }
"~/.ghr/github.com/risu729/kuebiko" = { url = "https://github.com/risu729/kuebiko.git" }
"~/.ghr/github.com/risu729/mikoto" = { url = "https://github.com/risu729/mikoto.git" }
"~/.ghr/github.com/risu729/mise" = { url = "https://github.com/risu729/mise.git" }
"~/.ghr/github.com/risu729/mise-action" = { url = "https://github.com/risu729/mise-action.git" }
"~/.ghr/github.com/risu729/renovate-config" = { url = "https://github.com/risu729/renovate-config.git" }
"~/.ghr/github.com/risu729/tsconfigs" = { url = "https://github.com/risu729/tsconfigs.git" }

[bootstrap.user]
login_shell = "/bin/bash"

[dotfiles]
"~/.agents" = { source = "wsl/home/.agents", mode = "copy" }
"~/.bashrc" = "wsl/home/.bashrc"
"~/.claude/CLAUDE.md" = "wsl/home/.codex/AGENTS.md"
"~/.codex" = { source = "wsl/home/.codex", mode = "symlink-each" }
"~/.config" = { source = "wsl/home/.config", mode = "symlink-each" }
"~/.cursor/rules/global/RULE.md" = "wsl/home/.codex/AGENTS.md"
"~/.ghr" = { source = "wsl/home/.ghr", mode = "symlink-each" }
"~/.hushlogin" = "wsl/home/.hushlogin"
"~/.local" = { source = "wsl/home/.local", mode = "symlink-each" }
"~/.selected_editor" = "wsl/home/.selected_editor"

[hooks]
postinstall = """
{% if env.CI is undefined %}
  mise run --no-deps install:ps-script-analyzer
  hk install --mise
{% endif %}
"""
