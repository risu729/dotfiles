name: Test Installer on Linux

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * SUN"

concurrency:
  group: ${{ github.workflow }}-${{ case(github.event_name == 'pull_request', github.event.pull_request.number, github.ref) }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  test-linux:
    name: Test Installer Scripts on WSL Ubuntu Image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read # for checkout
    env:
      COMPOSE_PROJECT_NAME: dotfiles-ci-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare Docker Compose environment
        run: |
          mise_version=$(sed -n 's/^min_version = "\(.*\)"$/\1/p' mise.toml)
          if [[ -z ${mise_version} ]]; then
            echo "Failed to read mise min_version." >&2
            exit 1
          fi
          echo "MISE_VERSION=${mise_version}" >> "${GITHUB_ENV}"

      - name: Download Ubuntu WSL image
        run: curl --fail-with-body --location --output wsl-amd64.wsl "${IMAGE_URL}"
        env:
          # Keep WSL image target stable because newest LTS metadata can
          # appear before cdimages publishes the corresponding wsl artifact.
          IMAGE_URL: https://cdimages.ubuntu.com/ubuntu-wsl/noble/daily-live/current/noble-wsl-amd64.wsl

      - name: Run installer
        run: docker compose --file compose.ci.yml up --build --abort-on-container-exit --exit-code-from test-linux
        env:
          GITHUB_TOKEN: ${{ github.token }}
          __CI: true
          GIT_REPO_URL: ${{ github.event.repository.clone_url }}
          # use head sha for pull requests because github.sha is set to the merge commit
          GIT_COMMIT_SHA: ${{ case(github.event_name == 'pull_request', github.event.pull_request.head.sha, github.sha) }}
          MISE_LOG_LEVEL: ${{ case(runner.debug == '1', 'debug', 'info') }}

      - name: Clean up Docker Compose
        if: ${{ always() }}
        run: docker compose --file compose.ci.yml down --volumes --remove-orphans

  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - test-linux
    if: ${{ !cancelled() }}

    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # for actions-timeline

    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
