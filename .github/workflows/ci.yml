name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * SUN"

concurrency:
  group: ${{ github.workflow }}-${{ case(github.event_name == 'pull_request', github.event.pull_request.number, github.ref) }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.10
          install_args: --locked
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Cache lychee
        if: ${{ github.event_name == 'schedule' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run check
        run: mise run check
        env:
          LINT: true
          SCHEDULED_LINT: ${{ github.event_name == 'schedule' }}
          GITHUB_TOKEN: ${{ github.token }}

  test-linux:
    name: Test Installer Scripts on WSL Ubuntu Image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read # for checkout
    env:
      COMPOSE_PROJECT_NAME: dotfiles-ci-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Prepare Docker Compose environment
        run: |
          mise_version=$(sed -n 's/^min_version = "\(.*\)"$/\1/p' mise.toml)
          if [[ -z ${mise_version} ]]; then
            echo "Failed to read mise min_version." >&2
            exit 1
          fi
          echo "MISE_VERSION=${mise_version}" >> "${GITHUB_ENV}"

      - name: Download Ubuntu WSL image
        run: curl --fail-with-body --location --output wsl-amd64.wsl "${IMAGE_URL}"
        env:
          # Keep WSL image target stable because newest LTS metadata can
          # appear before cdimages publishes the corresponding wsl artifact.
          IMAGE_URL: https://cdimages.ubuntu.com/ubuntu-wsl/noble/daily-live/current/noble-wsl-amd64.wsl

      - name: Run installer
        run: docker compose --file compose.ci.yml up --build --abort-on-container-exit --exit-code-from test-linux
        env:
          GITHUB_TOKEN: ${{ github.token }}
          __CI: true
          GIT_REPO_URL: ${{ github.event.repository.clone_url }}
          # use head sha for pull requests because github.sha is set to the merge commit
          GIT_COMMIT_SHA: ${{ case(github.event_name == 'pull_request', github.event.pull_request.head.sha, github.sha) }}
          MISE_LOG_LEVEL: ${{ case(runner.debug == '1', 'debug', 'info') }}

      - name: Clean up Docker Compose
        if: ${{ always() }}
        run: docker compose --file compose.ci.yml down --volumes --remove-orphans

  test-worker:
    name: Cloudflare Workers Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read # for checkout

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: |
            mise.toml
            mise.lock
            tasks.toml
            tasks/
            worker/
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.10
          install_args: --locked
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run tests
        run: mise run worker:test
        env:
          CURRENT_BRANCH: ${{ case(github.event_name == 'pull_request', github.head_ref, github.ref_name) }}
          GITHUB_TOKEN: ${{ github.token }}

  ci-check:
    name: CI Check
    needs:
      - lint
      - test-linux
      - test-worker
    # ref: https://github.com/aquaproj/aqua-registry/pull/38449#issuecomment-3038859524
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Fail CI Check
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - ci-check
    if: ${{ !cancelled() }}

    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # for actions-timeline

    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
