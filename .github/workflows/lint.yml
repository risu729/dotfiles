name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * SUN"

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  list-tasks:
    name: List Lint Tasks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read # for checkout

    outputs:
      tasks: ${{ steps.list.outputs.tasks }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.4.18
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install tools (locked)
        run: mise install --locked

      - name: List mise tasks
        id: list
        run: mise run ci:list-tasks

  lint:
    needs: list-tasks

    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read # for checkout

    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        # use include not to be treated as multi-dimensional matrix
        # ref: https://docs.github.com/en/actions/using-jobs/using-a-matrix-for-your-jobs#expanding-or-adding-matrix-configurations
        include: ${{ fromJson(needs.list-tasks.outputs.tasks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.4.18
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install tools (locked)
        run: mise install --locked

      - name: Restore cache
        id: restore-cache
        if: matrix.cache_path != ''
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ matrix.cache_path }}
          key: cache-${{ matrix.name }}-${{ github.sha }}
          restore-keys: cache-${{ matrix.name }}-

      - name: Run ${{ matrix.name }}
        run: mise run "${TASK_NAME}"
        env:
          LINT: true
          GITHUB_TOKEN: ${{ matrix.require_gh_token == 'true' && github.token || '' }}
          TASK_NAME: ${{ matrix.task }}

      - name: Save cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: ${{ !cancelled() && matrix.cache_path != '' }}
        with:
          path: ${{ matrix.cache_path }}
          key: ${{ steps.restore-cache.outputs.cache-primary-key }}

  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - lint
    if: ${{ !cancelled() }}

    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read

    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
